services:
  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    depends_on:
      - pushgateway

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  log-consumer:
    build: ./consumer
    container_name: log-consumer
    restart: unless-stopped
    environment:
      - ENDPOINT_URL=${ENDPOINT_URL}
      - ACCESS_KEY_ID=${ACCESS_KEY_ID}
      - SECRET_KEY=${SECRET_KEY}
      - BUCKET_NAME=${BUCKET_NAME}
      - PUSHGATEWAY_URL=pushgateway:9091
      - CONSUMER_INSTANCE=log-consumer
      - PROCESSED_FILE=/state/processed_keys.txt
      - S3_PREFIX=${S3_PREFIX:-}
      - LOG_KEY_SUFFIXES=${LOG_KEY_SUFFIXES:-.gz}
      - POLL_INTERVAL_SEC=${POLL_INTERVAL_SEC:-30}
    volumes:
      - log_consumer_state:/state
    depends_on:
      - pushgateway

  kpi-exporter:
    build: ./kpi_exporter
    container_name: kpi-exporter
    restart: unless-stopped
    environment:
      - KPI_EXPORTER_PORT=9108
      - KPI_EXPORTER_REFRESH_SEC=${KPI_EXPORTER_REFRESH_SEC:-60}
      - OVERVIEW_SNAPSHOT_JSON=/data/overview/overview_snapshot.json
      - OVERVIEW_XLSX_PATH=/data/overview/overview_report.xlsx
      - DEVICE_DAILY_CSV=/data/overview/device_daily.csv
      - DEVICE_SNAPSHOT_CSV=/data/overview/device_snapshot.csv
      - WATCH_SNAPSHOT_JSON=/data/watch/watch_snapshot.json
      - WATCH_DAILY_CSV=/data/profile/daily_volume.csv
      - WATCH_CHANNEL_SUMMARY_CSV=/data/profile/channel_summary.csv
      - WATCH_CHANNEL_DAILY_CSV=/data/profile/channel_daily.csv
      - WATCH_GEO_CSV=/data/profile/geo_top.csv
      - WATCH_DEVICE_TYPE_CSV=/data/profile/device_type_by_channel.csv
      - WATCH_UA_CSV=/data/profile/ua_top.csv
      - WATCH_CONTENT_CSV=/data/profile/querystr_channel_profile.csv
      - PROFILE_TOP_N=${PROFILE_TOP_N:-20}
    volumes:
      - "./kpi_sources/overview:/data/overview:ro"
      - "./kpi_sources/watch:/data/watch:ro"
      - "D:/Vs - Code Work/PC2 Full/Vs - Code Work/vglive_channel_profile/deep_profile_full:/data/profile:ro"
    ports:
      - "9108:9108"

volumes:
  prometheus_data:
  grafana_data:
  log_consumer_state:
