<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Overview Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--teal:#0F6E56;--teal-light:#E1F5EE;--amber:#BA7517;--amber-light:#FAEEDA;--red:#A32D2D;--red-light:#FCEBEB;--purple:#534AB7;--purple-light:#EEEDFE;--gray:#5F5E5A;--gray-light:#F1EFE8;--green:#3B6D11;--green-light:#EAF3DE;--border:#e2e8f0;--card:#fff;--surface:#f4f6f9}

/* ── Top bar ── */
.topbar{background:#1F3864;color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:17px;font-weight:600;letter-spacing:.2px}
.topbar span{font-size:12px;opacity:.65}

/* ── Drop zone ── */
#dropzone{margin:40px auto;max-width:520px;border:2px dashed #b0bec5;border-radius:14px;padding:52px 32px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:#fff}
#dropzone.drag{border-color:var(--blue);background:var(--blue-light)}
#dropzone i{font-size:42px;color:#90a4ae;display:block;margin-bottom:12px}
#dropzone p{font-size:15px;color:#546e7a;margin-bottom:6px}
#dropzone small{color:#90a4ae;font-size:12px}
#fileInput{display:none}
.btn-pick{margin-top:18px;display:inline-block;padding:9px 22px;background:var(--blue);color:#fff;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none}

/* ── Main content ── */
#main{display:none;padding:24px 28px;max-width:1400px;margin:0 auto}

/* ── Metadata strip ── */
.meta-strip{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:16px 32px;font-size:12.5px;color:var(--gray)}
.meta-strip b{color:#1a1a2e;font-weight:600}

/* ── Metric cards ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:16px 18px}
.card .label{font-size:11.5px;color:var(--gray);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.card .label .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card .value{font-size:26px;font-weight:600;line-height:1}
.card .sub{font-size:11px;color:#90a4ae;margin-top:4px}

/* ── Charts ── */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:820px){.charts{grid-template-columns:1fr}}
.chart-box{background:#fff;border-radius:10px;border:1px solid var(--border);padding:16px 18px}
.chart-box h3{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:14px}
.chart-box canvas{width:100%!important}

/* ── Table ── */
.table-wrap{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:24px}
.table-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-head h3{font-size:13px;font-weight:600}
.tbl-container{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:#f8fafc}
th{padding:9px 12px;text-align:right;font-size:11px;font-weight:600;color:var(--gray);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;background:#f8fafc}
th:first-child{text-align:left;position:sticky;left:0;background:#f8fafc;z-index:2}
td{padding:8px 12px;text-align:right;border-bottom:.5px solid var(--border);white-space:nowrap}
td:first-child{text-align:left;font-weight:500;position:sticky;left:0;background:inherit;z-index:1}
tr:hover td{background:#f0f7ff}
tr.total-row td{background:#1F3864!important;color:#fff!important;font-weight:700}
tr.alt td{background:#fafafa}
.pct-cell{color:var(--blue);font-weight:500}
.drop-pos{color:var(--green);font-weight:600}
.drop-neg{color:var(--red);font-weight:600}

/* ── Section labels in table header ── */
.th-blue{color:#fff;background:#1F3864}
.th-green{color:#fff;background:#3B6D11}
.th-amber{color:#fff;background:#BA7517}
.th-purple{color:#fff;background:#534AB7}
.group-header th{padding:5px 12px;font-size:10.5px}

/* ── Footer ── */
.footer{text-align:center;font-size:11px;color:#b0bec5;padding:12px 0 24px}
</style>
</head>
<body>

<div class="topbar">
  <h1>&#128202; Overview Report Dashboard</h1>
  <span id="fileLabel">No file loaded</span>
</div>

<!-- Drop Zone -->
<div id="dropzone" onclick="document.getElementById('fileInput').click()">
  <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="#90a4ae" stroke-width="1.4" style="display:block;margin:0 auto 12px"><path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
  <p>Drop <b>overview_report.xlsx</b> here</p>
  <small>or click to browse</small>
  <div style="margin-top:16px">
    <button class="btn-pick" onclick="event.stopPropagation();document.getElementById('fileInput').click()">Choose file</button>
  </div>
</div>
<input type="file" id="fileInput" accept=".xlsx,.xls"/>

<!-- Dashboard -->
<div id="main">
  <div class="meta-strip" id="metaStrip"></div>

  <div class="cards" id="cards"></div>

  <div class="charts">
    <div class="chart-box">
      <h3>Daily row volume</h3>
      <canvas id="chartRows" height="180"></canvas>
    </div>
    <div class="chart-box">
      <h3>Unique visitors (distinct cliIP)</h3>
      <canvas id="chartIP" height="180"></canvas>
    </div>
    <div class="chart-box">
      <h3>Session breakdown (avg daily)</h3>
      <canvas id="chartSession" height="180"></canvas>
    </div>
    <div class="chart-box">
      <h3>Daily GiB transferred</h3>
      <canvas id="chartBytes" height="180"></canvas>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <h3>Day-by-Day Breakdown</h3>
      <span style="font-size:11px;color:#90a4ae" id="dateRange"></span>
    </div>
    <div class="tbl-container">
      <table id="dataTable"></table>
    </div>
  </div>

  <div class="footer">Generated from overview_report.xlsx &mdash; drop a new file to refresh</div>
</div>

<script>
/* ────────────────────────────────────────────────
   Drag & drop wiring
──────────────────────────────────────────────── */
const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) processFile(f);
});
fi.addEventListener('change', () => { if (fi.files[0]) processFile(fi.files[0]); });

/* ────────────────────────────────────────────────
   Excel column indices (0-based, where col A = 0)
   The sheet uses:  A=0 (% drop label), B=1 (Date) … S=18
──────────────────────────────────────────────── */
const C = {
  DATE:      1,   // B
  BYTES:     2,   // C
  ROWS:      3,   // D
  IP_ROWS:   4,   // E
  DIST_IP:   5,   // F
  DIST_IPUA: 6,   // G
  DIST_DEV:  7,   // H
  DIST_SESS: 8,   // I
  UNIQ_IP:   9,   // J
  UNIQ_IPUA: 10,  // K
  SESS_AVAIL:11,  // L
  SESS_NA:   12,  // M
  SESS_NONE: 13,  // N
  PCT_IP:    14,  // O
  PCT_IPUA:  15,  // P
  PCT_SESS:  16,  // Q
  PCT_SESSNA:17,  // R
  PCT_NONE:  18,  // S
};

const DATA_START = 12; // 0-indexed → row 13 in Excel

let charts = {};

function processFile(file) {
  document.getElementById('fileLabel').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array', cellFormula: false, cellNF: false });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    render(raw, file.name);
  };
  reader.readAsArrayBuffer(file);
}

function v(row, col) {
  const val = row ? row[col] : null;
  if (val === null || val === undefined || val === '') return null;
  return val;
}

function num(row, col) {
  const x = v(row, col);
  if (x === null) return 0;
  return typeof x === 'number' ? x : parseFloat(String(x).replace(/,/g, '')) || 0;
}

function fmt(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('en-IN', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtPct(n) {
  if (n === null || isNaN(n)) return '—';
  const pct = n < 1 ? n * 100 : n;
  return pct.toFixed(2) + '%';
}

function render(raw, filename) {
  /* ── 1. Metadata (rows 1-9, 0-indexed 0-8) ── */
  const meta = {};
  for (let r = 1; r <= 8; r++) {
    const row = raw[r];
    if (row && row[1] && row[2]) meta[String(row[1]).trim()] = String(row[2]).trim();
  }
  const metaEl = document.getElementById('metaStrip');
  metaEl.innerHTML = Object.entries(meta).map(([k, v]) =>
    `<span><b>${k}:</b> ${v}</span>`
  ).join('');

  /* ── 2. Data rows (row 13 onward, 0-indexed 12+) ── */
  const dataRows = [];
  let totalRowIdx = -1;

  for (let r = DATA_START; r < raw.length; r++) {
    const row = raw[r];
    if (!row || !row[C.DATE]) continue;
    const dateStr = String(row[C.DATE]).trim();
    if (!dateStr) continue;
    if (dateStr.toUpperCase().includes('TOTAL')) { totalRowIdx = r; continue; }
    if (!dateStr.includes('/') && isNaN(Date.parse(dateStr))) continue; // skip junk rows

    dataRows.push({
      date:      dateStr,
      bytes:     num(row, C.BYTES),
      rows:      num(row, C.ROWS),
      ip_rows:   num(row, C.IP_ROWS),
      dist_ip:   num(row, C.DIST_IP),
      dist_ipua: num(row, C.DIST_IPUA),
      dist_dev:  num(row, C.DIST_DEV),
      dist_sess: num(row, C.DIST_SESS),
      sess_avail:num(row, C.SESS_AVAIL),
      sess_na:   num(row, C.SESS_NA),
      sess_none: num(row, C.SESS_NONE),
      pct_ip:    num(row, C.PCT_IP),
      pct_ipua:  num(row, C.PCT_IPUA),
      pct_sess:  num(row, C.PCT_SESS),
      pct_sessna:num(row, C.PCT_SESSNA),
      pct_none:  num(row, C.PCT_NONE),
    });
  }

  if (!dataRows.length) {
    alert('Could not find data rows. Make sure this is the correct overview_report.xlsx file.');
    return;
  }

  const totRows = num(raw[totalRowIdx], C.ROWS);
  const totBytes = num(raw[totalRowIdx], C.BYTES);
  const totIP   = num(raw[totalRowIdx], C.DIST_IP);
  const totSess = num(raw[totalRowIdx], C.DIST_SESS);

  /* ── 3. Metric cards ── */
  const cardData = [
    { label: 'Total rows',        value: fmt(totRows),          sub: 'from Parquet metadata', color: '#1F3864' },
    { label: 'Total GiB',         value: fmt(totBytes, 2),      sub: 'data transferred',      color: '#0F6E56' },
    { label: 'Distinct cliIPs',   value: fmt(totIP),            sub: 'unique visitors',        color: '#534AB7' },
    { label: 'Distinct sessions', value: fmt(totSess),          sub: 'session_id values',      color: '#BA7517' },
    { label: 'Days loaded',       value: dataRows.length,       sub: 'date records',           color: '#3B6D11' },
    { label: 'Avg rows / day',    value: fmt(Math.round(totRows / dataRows.length)), sub: 'daily average', color: '#A32D2D' },
  ];

  document.getElementById('cards').innerHTML = cardData.map(c => `
    <div class="card">
      <div class="label">
        <span class="dot" style="background:${c.color}"></span>
        ${c.label}
      </div>
      <div class="value" style="color:${c.color}">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('');

  /* ── 4. Date range label ── */
  if (dataRows.length >= 2) {
    document.getElementById('dateRange').textContent =
      `${dataRows[0].date} → ${dataRows[dataRows.length-1].date}`;
  }

  /* ── 5. Charts ── */
  const labels = dataRows.map(d => d.date);
  const CHART_DEFAULTS = { tension: 0.35, fill: true, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2 };

  function mkChart(id, datasets, yFmt) {
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          x: { ticks: { font: { size: 10 }, maxTicksLimit: 12 }, grid: { color: '#f0f0f0' } },
          y: {
            ticks: {
              font: { size: 10 },
              callback: v => yFmt === 'pct' ? v.toFixed(1) + '%' :
                            yFmt === 'gib' ? v.toFixed(1) + ' GiB' :
                            v >= 1e6 ? (v/1e6).toFixed(1)+'M' :
                            v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v
            },
            grid: { color: '#f0f0f0' }
          }
        }
      }
    });
  }

  mkChart('chartRows', [{
    label: 'Total rows', data: dataRows.map(d => d.rows),
    borderColor: '#185FA5', backgroundColor: 'rgba(24,95,165,0.08)', ...CHART_DEFAULTS
  }]);

  mkChart('chartIP', [{
    label: 'Distinct cliIP', data: dataRows.map(d => d.dist_ip),
    borderColor: '#534AB7', backgroundColor: 'rgba(83,74,183,0.08)', ...CHART_DEFAULTS
  }, {
    label: 'Distinct device_id', data: dataRows.map(d => d.dist_dev),
    borderColor: '#0F6E56', backgroundColor: 'rgba(15,110,86,0.06)', ...CHART_DEFAULTS
  }]);

  mkChart('chartSession', [{
    label: 'Session found + ID avail', data: dataRows.map(d => d.sess_avail),
    borderColor: '#3B6D11', backgroundColor: 'rgba(59,109,17,0.08)', ...CHART_DEFAULTS
  }, {
    label: 'Session found - ID missing', data: dataRows.map(d => d.sess_na),
    borderColor: '#BA7517', backgroundColor: 'rgba(186,117,23,0.07)', ...CHART_DEFAULTS
  }, {
    label: 'Session not found', data: dataRows.map(d => d.sess_none),
    borderColor: '#A32D2D', backgroundColor: 'rgba(163,45,45,0.07)', ...CHART_DEFAULTS
  }]);

  mkChart('chartBytes', [{
    label: 'GiB transferred', data: dataRows.map(d => d.bytes),
    borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.09)', ...CHART_DEFAULTS
  }], 'gib');

  /* ── 6. Table ── */
  const colGroups = [
    { label: 'Day-by-Day Breakdown', cols: 4,  cls: 'th-blue'   },
    { label: 'Unique Set',           cols: 4,  cls: 'th-green'  },
    { label: 'Rows Against',         cols: 3,  cls: 'th-amber'  },
    { label: '% of Total',           cols: 5,  cls: 'th-purple' },
  ];
  const colHeaders = [
    'Date (IST)', 'Bytes (GiB)', 'Total Rows', 'cliIP rows',
    'Distinct cliIP', 'Distinct cliIP+UA', 'Distinct device', 'Distinct session',
    'Sess found+ID', 'Sess found-ID', 'Sess not found',
    '% cliIP', '% cliIP+UA', '% Sess found', '% Sess-ID', '% Sess none',
  ];

  let tHtml = '<thead>';
  // Group header row
  tHtml += '<tr class="group-header"><th></th>';
  colGroups.forEach(g => `<th colspan="${g.cols}" class="${g.cls}" style="text-align:center">${g.label}</th>`
    .split('').forEach((ch, i) => { if (i === 0) tHtml += `<th colspan="${g.cols}" class="${g.cls}" style="text-align:center">${g.label}</th>`; }));
  tHtml += '</tr>';
  // Sub-headers
  tHtml += '<tr>' + colHeaders.map((h, i) => `<th>${h}</th>`).join('') + '</tr>';
  tHtml += '</thead><tbody>';

  dataRows.forEach((d, idx) => {
    const alt = idx % 2 === 1 ? ' class="alt"' : '';
    tHtml += `<tr${alt}>
      <td>${d.date}</td>
      <td>${fmt(d.bytes, 2)}</td>
      <td>${fmt(d.rows)}</td>
      <td>${fmt(d.ip_rows)}</td>
      <td>${fmt(d.dist_ip)}</td>
      <td>${fmt(d.dist_ipua)}</td>
      <td>${fmt(d.dist_dev)}</td>
      <td>${fmt(d.dist_sess)}</td>
      <td>${fmt(d.sess_avail)}</td>
      <td>${fmt(d.sess_na)}</td>
      <td>${fmt(d.sess_none)}</td>
      <td class="pct-cell">${fmtPct(d.pct_ip)}</td>
      <td class="pct-cell">${fmtPct(d.pct_ipua)}</td>
      <td class="pct-cell">${fmtPct(d.pct_sess)}</td>
      <td class="pct-cell">${fmtPct(d.pct_sessna)}</td>
      <td class="pct-cell">${fmtPct(d.pct_none)}</td>
    </tr>`;
  });

  // % Drop row (last 5 days comparison)
  if (dataRows.length >= 6) {
    const lastFull = dataRows[dataRows.length - 2];
    const prev4 = dataRows.slice(-6, -2);
    const avg = key => prev4.reduce((s, d) => s + d[key], 0) / prev4.length;
    const drop = key => lastFull[key] / avg(key) - 1;
    const fmtDrop = key => {
      const d = drop(key);
      if (isNaN(d) || !isFinite(d)) return '—';
      const cls = d >= 0 ? 'drop-pos' : 'drop-neg';
      return `<span class="${cls}">${d >= 0 ? '+' : ''}${(d * 100).toFixed(2)}%</span>`;
    };
    tHtml += `<tr style="border-top:2px solid #e2e8f0;background:#fafbff">
      <td style="font-weight:600;font-size:11px;color:#534AB7">% Drop/Gain<br><small style="font-weight:400;color:#90a4ae">vs avg prev 4 days</small></td>
      <td>${fmtDrop('bytes')}</td>
      <td>${fmtDrop('rows')}</td>
      <td>${fmtDrop('ip_rows')}</td>
      <td>${fmtDrop('dist_ip')}</td>
      <td>${fmtDrop('dist_ipua')}</td>
      <td>${fmtDrop('dist_dev')}</td>
      <td>${fmtDrop('dist_sess')}</td>
      <td>${fmtDrop('sess_avail')}</td>
      <td>${fmtDrop('sess_na')}</td>
      <td>${fmtDrop('sess_none')}</td>
      <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>
    </tr>`;
  }

  // Total row
  if (totalRowIdx >= 0) {
    const tr = raw[totalRowIdx];
    tHtml += `<tr class="total-row">
      <td>TOTAL</td>
      <td>${fmt(num(tr, C.BYTES), 2)}</td>
      <td>${fmt(num(tr, C.ROWS))}</td>
      <td>${fmt(num(tr, C.IP_ROWS))}</td>
      <td>${fmt(num(tr, C.DIST_IP))}</td>
      <td>${fmt(num(tr, C.DIST_IPUA))}</td>
      <td>${fmt(num(tr, C.DIST_DEV))}</td>
      <td>${fmt(num(tr, C.DIST_SESS))}</td>
      <td>${fmt(num(tr, C.SESS_AVAIL))}</td>
      <td>${fmt(num(tr, C.SESS_NA))}</td>
      <td>${fmt(num(tr, C.SESS_NONE))}</td>
      <td colspan="5" style="text-align:center;font-size:11px;opacity:.7">— % columns are per-row —</td>
    </tr>`;
  }

  tHtml += '</tbody>';
  document.getElementById('dataTable').innerHTML = tHtml;

  /* ── Show dashboard ── */
  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}
</script>
</body>
</html>
