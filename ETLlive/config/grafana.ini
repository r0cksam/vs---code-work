[paths]
data = ../../runtime/grafana-data
logs = ../../logs/grafana
plugins = ../../runtime/grafana-plugins
provisioning = ../../grafana/provisioning

[server]
http_addr = 127.0.0.1
http_port = 3000
domain = localhost

[security]
admin_user = admin
admin_password = admin

[users]
default_theme = dark

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[log]
mode = console file
level = info
