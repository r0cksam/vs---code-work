<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Veto Concurrency</title>
$CHARTJS_TAG
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1012;--panel:#1b1b1d;--panel2:#17191d;--line:#30343a;--soft:#98a2b3;--text:#eef4fb;--muted:#a7b0bd;--accent:#c77a32;--blue:#5794f2;--green:#73bf69;--red:#f2495c}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:#101214}
.topbar h1{font-size:18px;font-weight:850}
.topbar .sub{font-size:11px;color:var(--soft);text-align:right;line-height:1.35}
.wrap{max-width:1900px;margin:0 auto;padding:14px 18px 24px}
.filter-bar{border:1px solid var(--line);border-radius:7px;background:#111317;padding:10px 12px;margin-bottom:12px;display:flex;align-items:stretch;gap:10px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 10px;border:1px solid #272c34;border-radius:7px;background:#15171b;min-width:min(100%,270px)}
.filter-group.date-group{flex:1 1 500px}.filter-group.content-group{flex:1 1 520px}.filter-group.chart-group{flex:1 1 460px}
.filter-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.data-status{border:1px solid #343943;border-radius:7px;background:#15171b;color:#cbd5e1;margin-bottom:12px;padding:9px 11px;font-size:11px;font-weight:750;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.data-status b{color:#eef4fb}
.filter-title{font-size:10px;font-weight:850;text-transform:uppercase;color:var(--soft);letter-spacing:.04em}
.filter-sep{width:1px;height:24px;background:var(--line)}
input[type="date"],select{background:#171a1f;border:1px solid #39404a;color:var(--text);border-radius:5px;padding:6px 8px;font:inherit;font-size:11px;font-weight:750;min-width:150px;outline:none}
select.wide{min-width:260px}
input[type="date"]:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(199,122,50,.18)}
.btn{background:#171a1f;border:1px solid #39404a;color:var(--text);border-radius:5px;padding:6px 10px;font-size:11px;font-weight:800;cursor:pointer}
.btn:hover{border-color:#667085}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.range-text{margin-left:auto;color:var(--soft);font-size:11px;font-weight:750}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-bottom:12px}
.mini{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:9px 10px;min-width:0}
.mini b{display:block;font-size:9px;text-transform:uppercase;color:var(--soft);margin-bottom:4px;line-height:1.15}
.mini span{display:block;font-size:18px;font-weight:850;color:var(--text);line-height:1.1;overflow-wrap:anywhere}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:12px 14px;margin-bottom:12px}
.panel h2{font-size:13px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.chart-heading{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
.chart-heading h2{margin:0}.chart-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chart-box{height:clamp(520px,68vh,820px);background:#1b1b1d;border:1px solid var(--line);border-radius:7px;padding:10px}
canvas{width:100%!important;height:100%!important}
.chart-modal{position:fixed;inset:0;background:rgba(7,8,10,.9);z-index:100;display:none;padding:18px}
.chart-modal.open{display:flex}
.chart-modal-panel{width:100%;height:100%;min-height:0;display:flex;flex-direction:column;background:#111317;border:1px solid #3b414b;border-radius:7px;box-shadow:0 20px 70px rgba(0,0,0,.5)}
.chart-modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line)}
.chart-modal-title{font-size:14px;font-weight:850}.chart-modal-sub{font-size:11px;color:var(--soft);font-weight:750;margin-top:3px}
.chart-box.expanded{height:auto;flex:1;min-height:0;border:0;border-radius:0}
body.modal-open{overflow:hidden}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,520px),1fr));gap:12px}
.table-wrap{max-height:440px;overflow:auto;border:1px solid var(--line);border-radius:7px;background:#15171b}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;min-width:920px}
th{position:sticky;top:0;background:#202329;color:#cbd5e1;text-align:left;padding:8px;border-bottom:1px solid #343943;z-index:2;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid #272b32;color:#e6edf5;vertical-align:top}
tr:hover td{background:#1f2329}
.num{text-align:right;font-variant-numeric:tabular-nums}
.footer{padding:12px 0 0;color:#7f8794;text-align:center;font-size:10px}
@media(max-width:900px){.wrap{padding:12px}.topbar .sub{text-align:left}.range-text{width:100%;margin-left:0}.filter-sep{display:none}.filter-group,.filter-group.date-group,.filter-group.content-group,.filter-group.chart-group{width:100%;flex-basis:100%}.filter-actions{width:100%;margin-left:0}.chart-box{height:470px}.chart-modal{padding:8px}select.wide,input[type="date"],select{min-width:100%;width:100%}}
</style>
</head>
<body>
<div class="topbar">
  <h1 id="title"></h1>
  <div class="sub"><div id="rangeMeta"></div><div id="fullDateMeta"></div><div id="generatedMeta"></div></div>
</div>
<div class="wrap">
  <div class="data-status" id="dataStatus"></div>
  <div class="filter-bar">
    <div class="filter-group date-group">
      <span class="filter-title">Date Range</span>
      <input type="date" id="dateStart" onchange="setDateRange()"/>
      <span style="font-size:12px;color:var(--soft);font-weight:750">to</span>
      <input type="date" id="dateEnd" onchange="setDateRange()"/>
      <button class="btn" id="allBtn" onclick="setPreset('all')">All</button>
      <button class="btn" id="thirtyBtn" onclick="setPreset(30)">30D</button>
      <button class="btn" id="sevenBtn" onclick="setPreset(7)">7D</button>
      <button class="btn" id="latestBtn" onclick="setPreset('latest')">Yesterday</button>
    </div>
    <div class="filter-group content-group">
      <span class="filter-title">Platform</span>
      <select id="platformSelect" onchange="setPlatform(this.value)"></select>
      <span class="filter-title">Channel</span>
      <select class="wide" id="channelSelect" onchange="setChannel(this.value)"></select>
    </div>
    <div class="filter-group chart-group">
      <span class="filter-title">Viewer ID</span>
      <select id="identitySelect" onchange="setIdentity(this.value)"></select>
      <span class="filter-title">Chart Value</span>
      <select id="metricSelect" onchange="setMetric(this.value)"></select>
      <span class="filter-title">Lines</span>
      <select id="lineModeSelect" onchange="setLineMode(this.value)"></select>
    </div>
    <div class="filter-actions">
      <button class="btn" onclick="resetFilters()">Reset</button>
      <span class="range-text" id="selectionText"></span>
    </div>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="panel">
    <div class="chart-heading">
      <h2><span>Minute-Level Concurrency</span><span id="lineCount" style="color:var(--soft);font-size:11px;margin-left:8px"></span></h2>
      <div class="chart-actions"><button class="btn" onclick="openChartModal()">Expand</button></div>
    </div>
    <div class="chart-box"><canvas id="concurrencyChart"></canvas></div>
  </div>
  <div class="grid-2">
    <div class="panel"><h2>Concurrency Summary</h2><div class="table-wrap" id="summaryTable"></div></div>
    <div class="panel"><h2>Peak Minutes</h2><div class="table-wrap" id="peakTable"></div></div>
  </div>
  <div class="footer" id="fileMeta"></div>
</div>
<div class="chart-modal" id="chartModal" aria-hidden="true">
  <div class="chart-modal-panel">
    <div class="chart-modal-head">
      <div>
        <div class="chart-modal-title">Minute-Level Concurrency</div>
        <div class="chart-modal-sub" id="modalContext"></div>
      </div>
      <button class="btn" onclick="closeChartModal()">Close</button>
    </div>
    <div class="chart-box expanded"><canvas id="concurrencyChartExpanded"></canvas></div>
  </div>
</div>
<script>
const D = $DATA_BLOB;
const COLORS=['#c77a32','#5794f2','#73bf69','#f2495c','#b877d9','#ffb357','#2ec7b8','#e0b400','#8ab8ff','#e24d42','#a352cc','#56a64b'];
const VIEWER_IDENTITIES={
  cliip:{label:'cliIP',short:'cliIP',minuteKey:'unique_viewers',avgKey:'avg_unique_viewers',peakKey:'peak_unique_viewers',peakMinuteKey:'peak_unique_viewers_minute_ist'},
  ua:{label:'UA',short:'UA',minuteKey:'unique_ua_viewers',avgKey:'avg_unique_ua_viewers',peakKey:'peak_unique_ua_viewers',peakMinuteKey:'peak_unique_ua_minute_ist'}
};
const METRICS={
  active_viewers:{label:'Active viewers by selected ID',short:'Active Viewers'},
  segment_viewers_estimate:{label:'.ts estimate - all statuses',short:'.ts Estimate'},
  status_200_segment_viewers_estimate:{label:'.ts estimate - status 200 only',short:'Status 200 .ts Estimate'}
};
const LINE_MODES={
  total:{label:'Total line',short:'Total'},
  platform:{label:'By platform',short:'By Platform'},
  channel:{label:'By channel',short:'By Channel'}
};
let startDate='';
let endDate='';
let platform='all';
let channel='all';
let identity='cliip';
let metric='active_viewers';
let lineMode='total';
let chart=null;
let expandedChart=null;

const minute=(D.minute||[]).sort(function(a,b){return String(a.minute_ist||'').localeCompare(String(b.minute_ist||''));});
const summary=D.summary||[];
const fmt=function(n,d){if(n==null||isNaN(n))return '-';return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d||0,maximumFractionDigits:d||0});};
const compact=function(v){v=Number(v||0);return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':fmt(v,v<10&&v>0?1:0);};
const escapeHtml=function(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});};
const sum=function(rows,key){return (rows||[]).reduce(function(a,r){return a+Number(r[key]||0);},0);};
const maxVal=function(rows,key){return (rows||[]).reduce(function(a,r){return Math.max(a,Number(r[key]||0));},0);};

function pairKey(row){return String(row.pair_key||String(row.source||'fast')+'|'+String(row.platform_key||'')+'|'+String(row.candidate_id||'')+'|'+String(row.channel_name||''));}
function platformKey(row){return String(row.platform_key||row.platform_name||'');}
function channelLabel(row,withPlatform){
  const label=String(row.channel_name||'Other')+(row.candidate_id?' ('+row.candidate_id+')':'');
  return withPlatform?String(row.platform_name||'Unknown FAST Platform')+' - '+label:label;
}
function activeIdentity(){return VIEWER_IDENTITIES[identity]||VIEWER_IDENTITIES.cliip;}
function metricKey(key){key=key||metric;return key==='active_viewers'?activeIdentity().minuteKey:key;}
function metricShort(key){key=key||metric;return key==='active_viewers'?'Active '+activeIdentity().short:(METRICS[key]?.short||'Value');}
function metricLabel(key){key=key||metric;return key==='active_viewers'?'Active viewers by '+activeIdentity().label:(METRICS[key]?.label||'Value');}
function metricOptionLabel(key){return key==='active_viewers'?'Active viewers by '+activeIdentity().label:(METRICS[key]?.label||key);}
function metricValue(row,key){return Number(row[metricKey(key)]||0);}
function allDates(){
  return Array.from(new Set(minute.map(function(r){return String(r.log_date||'');}))).filter(Boolean).sort();
}
function selectedDates(){
  const dates=allDates();
  const latestFull=String(D.stats?.latest_full_date||'');
  const full=latestFull?dates.filter(function(d){return d<=latestFull;}):dates;
  return full.length?full:dates;
}
function rowInRange(row){
  const d=String(row.log_date||'');
  return (!startDate||d>=startDate)&&(!endDate||d<=endDate);
}
function rangeRows(){return minute.filter(rowInRange);}
function filteredRows(){
  return rangeRows().filter(function(r){
    return (platform==='all'||platformKey(r)===platform)&&(channel==='all'||pairKey(r)===channel);
  });
}
function setOptions(id,items,value){
  const el=document.getElementById(id);
  el.innerHTML=items.map(function(item){return '<option value="'+escapeHtml(item.value)+'">'+escapeHtml(item.label)+'</option>';}).join('');
  if(value&&items.some(function(i){return String(i.value)===String(value);})){el.value=value;}
  else if(items.length){el.value=items[0].value;}
  return el.value||'';
}
function syncControls(){
  const days=selectedDates();
  const first=days[0]||'';
  const last=days[days.length-1]||'';
  if(!startDate||startDate<first||startDate>last)startDate=last;
  if(!endDate||endDate<first||endDate>last)endDate=last;
  if(startDate>endDate){const tmp=startDate;startDate=endDate;endDate=tmp;}
  ['dateStart','dateEnd'].forEach(function(id){
    const el=document.getElementById(id);
    el.min=first;el.max=last;el.value=id==='dateStart'?startDate:endDate;
  });
  const lastSeven=days.slice(-7);
  const lastThirty=days.slice(-30);
  document.getElementById('allBtn').classList.toggle('active',startDate===first&&endDate===last);
  document.getElementById('thirtyBtn').classList.toggle('active',lastThirty.length&&startDate===lastThirty[0]&&endDate===lastThirty[lastThirty.length-1]);
  document.getElementById('latestBtn').classList.toggle('active',startDate===last&&endDate===last);
  document.getElementById('sevenBtn').classList.toggle('active',lastSeven.length&&startDate===lastSeven[0]&&endDate===lastSeven[lastSeven.length-1]);
  identity=setOptions('identitySelect',Object.keys(VIEWER_IDENTITIES).map(function(k){return {value:k,label:VIEWER_IDENTITIES[k].label};}),identity||'cliip');
  setOptions('metricSelect',Object.keys(METRICS).map(function(k){return {value:k,label:metricOptionLabel(k)};}),metric);
  lineMode=setOptions('lineModeSelect',Object.keys(LINE_MODES).map(function(k){return {value:k,label:LINE_MODES[k].label};}),lineMode||'total');
  const rRows=rangeRows();
  const platforms=[{value:'all',label:'All Platforms'}].concat(Array.from(new Map(rRows.map(function(r){return [platformKey(r),{value:platformKey(r),label:String(r.platform_name||'Unknown FAST Platform')}];})).values()).sort(function(a,b){return a.label.localeCompare(b.label);}));
  platform=setOptions('platformSelect',platforms,platform||'all');
  const pRows=rRows.filter(function(r){return platform==='all'||platformKey(r)===platform;});
  const withPlatform=platform==='all';
  const channels=[{value:'all',label:'All Channels'}].concat(Array.from(new Map(pRows.map(function(r){return [pairKey(r),{value:pairKey(r),label:channelLabel(r,withPlatform)}];})).values()).sort(function(a,b){return a.label.localeCompare(b.label);}));
  channel=setOptions('channelSelect',channels,channel||'all');
  document.getElementById('selectionText').textContent=(startDate&&endDate?startDate+' to '+endDate:'No dates')+' | '+fmt(rRows.length)+' minute rows';
}
function setDateRange(){startDate=document.getElementById('dateStart').value||startDate;endDate=document.getElementById('dateEnd').value||endDate;if(startDate>endDate){const t=startDate;startDate=endDate;endDate=t;}render();}
function setPreset(mode){const days=selectedDates();if(!days.length)return;if(mode==='latest'){startDate=days[days.length-1];endDate=days[days.length-1];}else if(mode==='all'){startDate=days[0];endDate=days[days.length-1];}else{const selected=days.slice(-Number(mode));startDate=selected[0]||days[0];endDate=selected[selected.length-1]||days[days.length-1];}render();}
function setPlatform(v){platform=v||'all';render();}
function setChannel(v){channel=v||'all';render();}
function setIdentity(v){identity=v||'cliip';render();}
function setMetric(v){metric=v||'active_viewers';render();}
function setLineMode(v){lineMode=v||'total';render();}
function resetFilters(){
  const days=selectedDates();
  if(days.length){
    startDate=days[days.length-1];
    endDate=days[days.length-1];
  }
  platform='all';
  channel='all';
  identity='cliip';
  metric='active_viewers';
  lineMode='total';
  render();
}
function lineGroups(rows){
  if(lineMode==='platform'){
    const buckets=new Map();
    (rows||[]).forEach(function(r){const key=platformKey(r);if(!buckets.has(key))buckets.set(key,{label:String(r.platform_name||'Unknown FAST Platform'),rows:[]});buckets.get(key).rows.push(r);});
    return Array.from(buckets.values()).sort(function(a,b){return maxVal(b.rows,metricKey())-maxVal(a.rows,metricKey());});
  }
  if(lineMode!=='channel')return [{label:selectionLabel(),rows:rows||[]}];
  const buckets=new Map();
  (rows||[]).forEach(function(r){const key=pairKey(r);if(!buckets.has(key))buckets.set(key,{label:String(r.platform_name||'Unknown FAST Platform')+' - '+channelLabel(r,false),rows:[]});buckets.get(key).rows.push(r);});
  return Array.from(buckets.values()).sort(function(a,b){return maxVal(b.rows,metricKey())-maxVal(a.rows,metricKey());});
}
function selectionLabel(){
  const p=document.getElementById('platformSelect').selectedOptions[0]?.textContent||'All Platforms';
  const c=document.getElementById('channelSelect').selectedOptions[0]?.textContent||'All Channels';
  return p+' / '+c;
}
function chartContextText(){
  const lineLabel=LINE_MODES[lineMode]?.label||'Total line';
  return (startDate&&endDate?startDate+' to '+endDate:'No dates')+' | '+selectionLabel()+' | '+metricLabel()+' | '+lineLabel;
}
function seriesFor(rows){
  const groups=lineGroups(rows);
  const minuteSet=new Set();
  groups.forEach(function(g){g.rows.forEach(function(r){minuteSet.add(String(r.minute_ist||''));});});
  const minutes=Array.from(minuteSet).filter(Boolean).sort();
  const multi=startDate!==endDate;
  const labels=minutes.map(function(m){return multi?m.slice(5,10)+' '+m.slice(11,16):m.slice(11,16);});
  const sets=groups.map(function(g){
    const byMinute=new Map();
    g.rows.forEach(function(r){const m=String(r.minute_ist||'');byMinute.set(m,(byMinute.get(m)||0)+metricValue(r));});
    return {label:g.label,data:minutes.map(function(m){return byMinute.get(m)||0;})};
  });
  return {minutes:minutes,labels:labels,datasets:sets};
}
function makeLineChart(targetId,rows,expanded){
  const s=seriesFor(rows);
  const target=document.getElementById(targetId);
  if(typeof Chart==='undefined'||!target)return {chart:null,lines:s.datasets.length};
  const instance=new Chart(target,{
    type:'line',
    data:{labels:s.labels,datasets:s.datasets.map(function(ds,i){return {label:ds.label,data:ds.data,borderColor:COLORS[i%COLORS.length],backgroundColor:i===0&&s.datasets.length===1?'rgba(199,122,50,.12)':'transparent',fill:i===0&&s.datasets.length===1,tension:.18,pointRadius:0,pointHoverRadius:expanded?5:4,borderWidth:expanded?1.6:1.25,spanGaps:true};})},
    options:{responsive:true,maintainAspectRatio:false,normalized:true,interaction:{mode:'nearest',axis:'xy',intersect:false},plugins:{legend:{display:s.datasets.length>1,position:'bottom',labels:{color:'#cbd5e1',usePointStyle:true,pointStyle:'line',boxWidth:14,font:{size:expanded?11:10}}},tooltip:{backgroundColor:'#2a2e33',borderColor:'#3a4048',borderWidth:1,titleColor:'#eef4fb',bodyColor:'#eef4fb',callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmt(ctx.parsed.y,1);}}}},scales:{x:{title:{display:true,text:'Time',color:'#d0d7e2',font:{size:11,weight:'700'}},ticks:{color:'#7f8794',font:{size:expanded?11:10},maxTicksLimit:expanded?34:20,autoSkip:true},grid:{color:'#2a2d31'}},y:{title:{display:true,text:metricLabel(),color:'#d0d7e2',font:{size:11,weight:'700'}},ticks:{color:'#7f8794',font:{size:expanded?11:10},callback:function(v){return compact(v);}},grid:{color:'#2a2d31'},beginAtZero:true}}}
  });
  return {chart:instance,lines:s.datasets.length};
}
function drawChart(rows){
  if(chart){chart.destroy();chart=null;}
  const result=makeLineChart('concurrencyChart',rows,false);
  chart=result.chart;
  document.getElementById('lineCount').textContent=fmt(result.lines)+' line'+(result.lines===1?'':'s');
  if(document.getElementById('chartModal').classList.contains('open')){
    if(expandedChart){expandedChart.destroy();expandedChart=null;}
    expandedChart=makeLineChart('concurrencyChartExpanded',rows,true).chart;
    document.getElementById('modalContext').textContent=chartContextText();
  }
}
function openChartModal(){
  const modal=document.getElementById('chartModal');
  modal.classList.add('open');
  modal.setAttribute('aria-hidden','false');
  document.body.classList.add('modal-open');
  document.getElementById('modalContext').textContent=chartContextText();
  if(expandedChart){expandedChart.destroy();expandedChart=null;}
  expandedChart=makeLineChart('concurrencyChartExpanded',filteredRows(),true).chart;
}
function closeChartModal(){
  const modal=document.getElementById('chartModal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden','true');
  document.body.classList.remove('modal-open');
  if(expandedChart){expandedChart.destroy();expandedChart=null;}
}
function stats(rows){
  const s=seriesFor(rows);
  const values=s.datasets.flatMap(function(ds){return ds.data;});
  const peak=values.length?Math.max.apply(null,values):0;
  const avg=values.length?values.reduce(function(a,v){return a+v;},0)/values.length:0;
  let peakMinute='';
  s.datasets.forEach(function(ds){ds.data.forEach(function(v,i){if(v===peak&&!peakMinute)peakMinute=s.minutes[i];});});
  return {lines:s.datasets.length,minutes:s.minutes.length,peak:peak,avg:avg,raw:sum(rows,'raw_ts_rows'),s200:sum(rows,'status_200_ts_rows'),peakMinute:peakMinute};
}
function mini(label,value){return '<div class="mini"><b>'+escapeHtml(label)+'</b><span>'+value+'</span></div>';}
function renderMetrics(rows){
  const st=stats(rows);
  document.getElementById('metrics').innerHTML=[
    mini('Date Range',escapeHtml(startDate+' to '+endDate)),
    mini('Platforms',platform==='all'?'All':escapeHtml(document.getElementById('platformSelect').selectedOptions[0]?.textContent||'-')),
    mini('Channels',channel==='all'?'All':escapeHtml(document.getElementById('channelSelect').selectedOptions[0]?.textContent||'-')),
    mini('Lines',escapeHtml(LINE_MODES[lineMode]?.short||'Total')),
    mini('Viewer ID',escapeHtml(activeIdentity().label)),
    mini('Peak '+metricShort(),fmt(st.peak,1)),
    mini('Average '+metricShort(),fmt(st.avg,1)),
    mini('Minutes',fmt(st.minutes)),
    mini('Line Count',fmt(st.lines)),
    mini('Raw TS Rows',fmt(st.raw)),
    mini('Status 200 TS Rows',fmt(st.s200)),
    mini('Peak Minute IST',escapeHtml(st.peakMinute||'-'))
  ].join('');
}
function groupRows(rows,keys,sumKeys,maxKeys,firstKeys){
  const buckets=new Map();
  (rows||[]).forEach(function(row){
    const id=keys.map(function(k){return String(row[k]||'');}).join('|');
    if(!buckets.has(id)){const item={};keys.forEach(function(k){item[k]=row[k]||'';});sumKeys.forEach(function(k){item[k]=0;});maxKeys.forEach(function(k){item[k]=0;});firstKeys.forEach(function(k){item[k]=row[k]||'';});buckets.set(id,item);}
    const item=buckets.get(id);
    sumKeys.forEach(function(k){item[k]+=Number(row[k]||0);});
    maxKeys.forEach(function(k){item[k]=Math.max(Number(item[k]||0),Number(row[k]||0));});
  });
  return Array.from(buckets.values());
}
function filteredSummary(){
  return summary.filter(function(r){return rowInRange(r)&&(platform==='all'||platformKey(r)===platform)&&(channel==='all'||pairKey(r)===channel);});
}
function summaryRows(){
  const rows=filteredSummary();
  const grouped=groupRows(rows,['platform_name','channel_name','candidate_id','reqHost','platform_key','pair_key'],['minute_count','raw_ts_rows','status_200_ts_rows'],['peak_unique_viewers','peak_unique_ua_viewers','peak_segment_viewers_estimate','peak_status_200_segment_viewers_estimate','distinct_hosts'],['peak_unique_viewers_minute_ist','peak_unique_ua_minute_ist','peak_segment_minute_ist']);
  grouped.forEach(function(r){
    const source=rows.filter(function(x){return pairKey(x)===pairKey(r);});
    r.avg_unique_viewers=source.length?sum(source,'avg_unique_viewers')/source.length:0;
    r.avg_unique_ua_viewers=source.length?sum(source,'avg_unique_ua_viewers')/source.length:0;
    const ident=activeIdentity();
    r.peak_active_viewers=Number(r[ident.peakKey]||0);
    r.avg_active_viewers=Number(r[ident.avgKey]||0);
    r.display_channel=channelLabel(r,platform==='all');
  });
  const sortKey=metric==='active_viewers'?'peak_active_viewers':(metric==='segment_viewers_estimate'?'peak_segment_viewers_estimate':'peak_status_200_segment_viewers_estimate');
  return grouped.sort(function(a,b){return Number(b[sortKey]||0)-Number(a[sortKey]||0);}).slice(0,200);
}
function peakRows(rows){
  const output=[];
  lineGroups(rows).forEach(function(g){
    const buckets=new Map();
    g.rows.forEach(function(r){const m=String(r.minute_ist||'');if(!buckets.has(m))buckets.set(m,{line_label:g.label,minute_ist:m,minute_utc:r.minute_utc||'',metric_value:0,unique_viewers:0,unique_ua_viewers:0,segment_viewers_estimate:0,status_200_segment_viewers_estimate:0,raw_ts_rows:0,status_200_ts_rows:0});const item=buckets.get(m);['unique_viewers','unique_ua_viewers','segment_viewers_estimate','status_200_segment_viewers_estimate','raw_ts_rows','status_200_ts_rows'].forEach(function(k){item[k]+=Number(r[k]||0);});item.metric_value+=metricValue(r);});
    output.push.apply(output,Array.from(buckets.values()));
  });
  return output.sort(function(a,b){return Number(b.metric_value||0)-Number(a.metric_value||0);}).slice(0,30);
}
function table(rows,cols,formatters){
  if(!rows.length)return '<div style="padding:14px;color:#98a2b3;font-size:12px">No rows available.</div>';
  const head='<thead><tr>'+cols.map(function(c){return '<th'+(formatters[c.key]?.num?' class="num"':'')+'>'+escapeHtml(c.label)+'</th>';}).join('')+'</tr></thead>';
  const body=rows.map(function(r){return '<tr>'+cols.map(function(c){const f=formatters[c.key];const v=r[c.key];const out=f&&f.fn?f.fn(v,r):escapeHtml(v);return '<td'+(f?.num?' class="num"':'')+'>'+out+'</td>';}).join('')+'</tr>';}).join('');
  return '<table>'+head+'<tbody>'+body+'</tbody></table>';
}
function renderTables(rows){
  const num={fn:function(v){return fmt(v);},num:true};
  const num1={fn:function(v){return fmt(v,1);},num:true};
  document.getElementById('summaryTable').innerHTML=table(summaryRows(),[
    {key:'platform_name',label:'Platform'},{key:'display_channel',label:'Channel'},{key:'peak_active_viewers',label:'Peak '+metricShort()},{key:'avg_active_viewers',label:'Avg '+metricShort()},{key:'peak_unique_viewers',label:'Peak cliIP'},{key:'peak_unique_ua_viewers',label:'Peak UA'},{key:'peak_segment_viewers_estimate',label:'Peak Segment Estimate'},{key:'minute_count',label:'Minutes'},{key:'distinct_hosts',label:'Hosts'},{key:'raw_ts_rows',label:'Raw TS Rows'},{key:'status_200_ts_rows',label:'Status 200 TS Rows'},{key:'reqHost',label:'Host Evidence'}
  ],{peak_active_viewers:num1,avg_active_viewers:num1,peak_unique_viewers:num1,peak_unique_ua_viewers:num1,peak_segment_viewers_estimate:num1,minute_count:num,distinct_hosts:num,raw_ts_rows:num,status_200_ts_rows:num});
  document.getElementById('peakTable').innerHTML=table(peakRows(rows),[
    {key:'line_label',label:'Line'},{key:'minute_ist',label:'Minute IST'},{key:'minute_utc',label:'Minute UTC'},{key:'metric_value',label:metricShort()},{key:'unique_viewers',label:'Active cliIP'},{key:'unique_ua_viewers',label:'Active UA'},{key:'segment_viewers_estimate',label:'Segment Estimate'},{key:'status_200_segment_viewers_estimate',label:'Status 200 Estimate'},{key:'raw_ts_rows',label:'Raw TS Rows'},{key:'status_200_ts_rows',label:'Status 200 TS Rows'}
  ],{metric_value:num1,unique_viewers:num1,unique_ua_viewers:num1,segment_viewers_estimate:num1,status_200_segment_viewers_estimate:num1,raw_ts_rows:num,status_200_ts_rows:num});
}
function render(){
  syncControls();
  const rows=filteredRows();
  drawChart(rows);
  renderMetrics(rows);
  renderTables(rows);
}
document.getElementById('title').textContent=D.title||'Veto Concurrency';
document.getElementById('rangeMeta').textContent='True data range: '+(D.stats?.first_date||'-')+' to '+(D.stats?.last_date||'-')+' | '+fmt(D.stats?.minute_rows||0)+' minute rows';
document.getElementById('fullDateMeta').textContent='Full-day filter range: '+(D.stats?.first_date||'-')+' to '+(D.stats?.latest_full_date||D.stats?.last_date||'-')+' IST';
document.getElementById('generatedMeta').textContent='Last updated '+(D.generated_at||'-');
document.getElementById('dataStatus').innerHTML='<span><b>Default range</b>: full completed dates only</span><span><b>Current IST date</b>: '+escapeHtml(D.stats?.current_ist_date||'-')+(D.stats?.current_date_hidden?' hidden from filters because it is still in progress':'')+'</span><span><b>Viewer ID</b>: switch between cliIP and UA without changing channel/date filters</span><span><b>Chart Value</b>: Active viewers uses selected ID; .ts estimates use rows / 10 per minute</span>';
document.getElementById('fileMeta').textContent='Source parquet: '+(D.files?.minute||'');
document.getElementById('chartModal').addEventListener('click',function(ev){if(ev.target===this)closeChartModal();});
document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeChartModal();});
render();
</script>
